<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bank Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .sidebar {
            background-color: #f8d7da;
        }

        .nav-link {
            border-radius: 6px;
            transition: 0.2s;
        }

        .nav-link:hover {
            background-color: #ffc107;
            color: black !important;
        }

        .nav-link.active {
            background-color: #ffc107;
            color: black;
            font-weight: 500;
        }
    </style>
</head>
 
<body class="d-flex flex-column min-vh-100">

    <!-- Header -->
    <nav class="navbar navbar-dark bg-warning">
        <div class="container text-center d-flex flex-column">
            <span class="fw-bold text-dark" style="font-size: 2.5rem;">Our Bank</span>
            <span class="text-dark">Banking at your doorstep</span>
        </div>
    </nav>

    <!-- Main -->
    <main class="flex-fill d-flex">
        <div class="container-fluid">
            <div class="row h-100">

                <!-- Sidebar -->
                <div class="col-md-3 col-lg-2 sidebar p-3 d-flex flex-column">
                    <ul class="nav flex-column flex-grow-1">
                        <li class="nav-item mb-2">
                            <a class="nav-link active" href="#" id="home">Home</a>
                        </li>
                        <li class="nav-item mb-2">
                            <a class="nav-link" href="#" id="about">About Us</a>
                        </li>
                        <li class="nav-item mb-2">
                            <a class="nav-link" href="#" id="services">Services</a>
                        </li>
                        <li class="nav-item mb-2">
                            <a class="nav-link" href="#" id="netbanking">Netbanking</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" id="contact">Contact Us</a>
                        </li>
                    </ul>
                </div>

                <!-- Content -->
                <div class="col-md-9 col-lg-10 p-4" id="selected-service">
                    <h2>Welcome to Our Bank</h2>
                    <p>Select a service from the sidebar.</p>
                </div>

            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-warning text-center py-3 mt-auto">
        <p class="mb-0">www.ourbank.com</p>
        <small>Copyright © All rights reserved.</small>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const contentDiv = document.getElementById('selected-service');
        const links = document.querySelectorAll(".nav-link");

        // Handle active link switching
        links.forEach(link => {
            link.addEventListener("click", function(e) {
                e.preventDefault();

                links.forEach(l => l.classList.remove("active"));
                this.classList.add("active");

                switch(this.id) {
                    case "home":
                        contentDiv.innerHTML = `
                            <h2>Welcome to Our Bank</h2>
                            <p>Select a service from the sidebar.</p>
                        `;
                        break;

                    case "about":
                        contentDiv.innerHTML = `
                            <h2>About Us</h2>
                            <p>We have been serving customers for over 50 years with trust and excellence.</p>
                        `;
                        break;

                    case "services":
                         contentDiv.innerHTML = `
                        <h2 class="mb-4">Our Services</h2>

                        <div class="row g-4">
                            <div class="col-md-6 col-lg-3">
                                <div class="card shadow-sm h-100">
                                    <div class="card-body text-center">
                                        <h5 class="card-title">Savings Account</h5>
                                        <p class="card-text">Secure and flexible savings options with attractive interest rates.</p>
                                        <button class="btn btn-warning btn-sm">Learn More</button>
                                    </div>
                                </div>
                            </div>

                            <div class="col-md-6 col-lg-3">
                                <div class="card shadow-sm h-100">
                                    <div class="card-body text-center">
                                        <h5 class="card-title">Current Account</h5>
                                        <p class="card-text">Designed for businesses with seamless transaction support.</p>
                                        <button class="btn btn-warning btn-sm">Learn More</button>
                                    </div>
                                </div>
                            </div>

                            <div class="col-md-6 col-lg-3">
                                <div class="card shadow-sm h-100">
                                    <div class="card-body text-center">
                                        <h5 class="card-title">Loans</h5>
                                        <p class="card-text">Personal, home, and business loans at competitive rates.</p>
                                        <button class="btn btn-warning btn-sm">Learn More</button>
                                    </div>
                                </div>
                            </div>

                            <div class="col-md-6 col-lg-3">
                                <div class="card shadow-sm h-100">
                                    <div class="card-body text-center">
                                        <h5 class="card-title">Credit Cards</h5>
                                        <p class="card-text">Enjoy rewards, cashback, and secure digital payments.</p>
                                        <button class="btn btn-warning btn-sm">Learn More</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                        break;

                    case "netbanking":
                        contentDiv.innerHTML = `
                            <h2 class="mb-4">Netbanking Login</h2>
                            <form id="loginForm" class="w-50">
                                <div class="mb-3">
                                    <label class="form-label">Username</label>
                                    <input type="text" class="form-control" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Password</label>
                                    <input type="password" class="form-control" required>
                                </div>
                                <button type="submit" class="btn btn-primary me-2">Login</button>
                                <button type="button" id="signupBtn" class="btn btn-secondary">Sign Up</button>
                            </form>
                        `;
                         document.getElementById("loginForm").addEventListener("submit", function(e) {
                            e.preventDefault();

                            contentDiv.innerHTML = `
                                <h2>Welcome to Our Bank</h2>
                                <p>Login successful!</p>
                            `;

                            // reset active link to Home
                            links.forEach(l => l.classList.remove("active"));
                            document.getElementById("home").classList.add("active");
                        });
                         // SIGN UP BUTTON
                        document.getElementById("signupBtn").addEventListener("click", function() {

                            contentDiv.innerHTML = `
                                <h2 class="mb-4">Create Account</h2>
                                <form id="signupForm" class="w-50">
                                    <div class="mb-3">
                                        <label class="form-label">Full Name</label>
                                        <input type="text" class="form-control" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Email</label>
                                        <input type="email" class="form-control" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Create Password</label>
                                        <input type="password" class="form-control" required>
                                    </div>
                                    <button type="submit" class="btn btn-success">Register</button>
                                </form>
                            `;

                            // SIGNUP SUBMIT
                            document.getElementById("signupForm").addEventListener("submit", function(e) {
                                e.preventDefault();

                                contentDiv.innerHTML = `
                                    <h2>Account Created Successfully</h2>
                                    <p>You can now login using your credentials.</p>
                                `;
                            });
                        });
                        break;

                    case "contact":
                        contentDiv.innerHTML = `
                            <h2>Contact Us</h2>
                            <p>Email: support@ourbank.com</p>
                            <p>Phone: +91 9876543210</p>
                        `;
                        break;
                }
            });
        });
    </script>

</body>
</html>
